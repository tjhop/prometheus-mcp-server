{{- if .Values.grafana.dashboards.enabled }}
{{- $dashboardFiles := (.Files.Glob "dashboards/*.json") }}
{{- range $path, $_ := $dashboardFiles }}
{{- $name := trimSuffix ".json" (base $path) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus-mcp-server.fullname" $ }}-{{ $name }}
  labels:
    {{- include "prometheus-mcp-server.labels" $ | nindent 4 }}
    {{ $.Values.grafana.dashboards.label }}: {{ $.Values.grafana.dashboards.labelValue | quote }}
  {{- with $.Values.grafana.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ $name }}.json: |-
    {{- $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
