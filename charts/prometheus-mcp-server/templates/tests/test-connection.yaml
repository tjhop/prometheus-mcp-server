apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "prometheus-mcp-server.fullname" . }}-test-connection"
  labels:
    {{- include "prometheus-mcp-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  activeDeadlineSeconds: 60
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if eq .Values.mcp.transport "http" }}
  initContainers:
    - name: server-ready-check
      image: "{{ .Values.test.image.repository }}:{{ .Values.test.image.tag }}"
      command: ['sh', '-c']
      args:
        - |
          wget -qO- http://{{ include "prometheus-mcp-server.fullname" . }}:{{ .Values.service.port }}/metrics | grep -q '^prom_mcp_server_ready 1$'
      {{- include "prometheus-mcp-server.testContainerSecurityContext" . | nindent 6 }}
  {{- end }}
  containers:
    - name: metrics-check
      image: "{{ .Values.test.image.repository }}:{{ .Values.test.image.tag }}"
      command: ['wget']
      args: ['--spider', '-q', 'http://{{ include "prometheus-mcp-server.fullname" . }}:{{ .Values.service.port }}/metrics']
      {{- include "prometheus-mcp-server.testContainerSecurityContext" . | nindent 6 }}
  restartPolicy: Never
