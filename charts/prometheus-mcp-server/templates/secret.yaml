{{- if and .Values.httpConfig.enabled (not .Values.httpConfig.existingSecret) .Values.httpConfig.config }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prometheus-mcp-server.fullname" . }}-http-config
  labels:
    {{- include "prometheus-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  http-config.yaml: |
    {{- .Values.httpConfig.config | toYaml | nindent 4 }}
{{- end }}
