name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC authentication to publish to MCP registry
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Go Preflight Tests
        run: |
          go mod tidy
          go test -v ./...
      - name: Docker Login (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          TAG_VERSION="$(echo "${{ github.ref_name }}" | sed 's/^v//')"
          sed -i "s/^version:.*/version: $TAG_VERSION/" charts/prometheus-mcp-server/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: $TAG_VERSION/" charts/prometheus-mcp-server/Chart.yaml
          helm package charts/prometheus-mcp-server
          helm push "prometheus-mcp-server-${TAG_VERSION}.tgz" oci://ghcr.io/tjhop/charts
