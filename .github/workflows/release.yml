name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC authentication to publish to MCP registry
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
      - name: Go Preflight Tests
        run: |
          go mod tidy
          go test -v ./...
      - name: Docker Login (ghcr.io)
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Sync Grafana dashboards into chart
        run: make helm-sync-dashboards

      - name: Package and push Helm chart
        run: |
          TAG_VERSION="$(echo "${{ github.ref_name }}" | sed 's/^v//')"
          sed -i "s/^version:.*/version: $TAG_VERSION/" charts/prometheus-mcp-server/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: $TAG_VERSION/" charts/prometheus-mcp-server/Chart.yaml
          helm package charts/prometheus-mcp-server
          helm push "prometheus-mcp-server-${TAG_VERSION}.tgz" oci://ghcr.io/tjhop/charts
